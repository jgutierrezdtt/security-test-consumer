name: Security

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "0 2 * * 1"

permissions:
  contents: read
  security-events: write
  pull-requests: write
  issues: write

jobs:
  semgrep:
    name: Semgrep SAST
    uses: jgutierrezdtt/security-platform/.github/workflows/reusable/semgrep-scan.yml@main
    permissions:
      contents: read
      security-events: write
      pull-requests: write
      issues: write
    with:
      scan-scope: ${{ github.event_name == 'pull_request' && 'diff' || 'full' }}
      fail-on-severity: high
      upload-sarif: true
    secrets: inherit

  dependabot-check:
    name: Dependabot Check
    uses: jgutierrezdtt/security-platform/.github/workflows/reusable/dependabot-check.yml@main
    permissions:
      contents: read
      security-events: write
      pull-requests: write
    secrets: inherit
